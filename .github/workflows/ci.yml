# SPDX-License-Identifier: Apache-2.0
#
# Builds hrx-xclbinutil on public GitHub runners — Linux (clang + gcc) and Windows
# (cl + clang-cl) — and runs the functional smoke test. No NPU, no XRT, no Boost — the
# tool is self-contained.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [clang, gcc]
    name: build-and-test (${{ matrix.compiler }})
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang

      - name: Configure
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then CC=clang; CXX=clang++; else CC=gcc; CXX=g++; fi
          cmake -G Ninja -B build -S . -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="$CC" -DCMAKE_CXX_COMPILER="$CXX"

      # Build the default target, not just hrx-xclbinutil: ctest needs the test
      # executables too, and naming one target means a test added later silently
      # never runs.
      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # Both Windows compilers. They are not interchangeable for consumers of this tool:
  # rocm-npu-staging builds the whole NPU stack with one compiler, and mlir-aie is only
  # tested with cl while IREE prefers clang-cl. Keeping both green here means that choice
  # stays open. The vendored aie-pdi-transform sources use no GNU-only syntax any more —
  # see libinclude/xpdi_compiler.h.
  build-and-test-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - toolset: msvc-cl
            cmake_toolset: ""            # default VS toolset = cl.exe
          - toolset: clang-cl
            cmake_toolset: "-T ClangCL"
    name: build-and-test (windows, ${{ matrix.toolset }})
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -S . -A x64 ${{ matrix.cmake_toolset }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

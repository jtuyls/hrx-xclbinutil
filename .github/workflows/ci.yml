# SPDX-License-Identifier: Apache-2.0
#
# Builds hrx-xclbinutil on public GitHub runners — Linux (clang + gcc) and Windows
# (clang-cl) — and runs the functional smoke test. No NPU, no XRT, no Boost — the tool
# is self-contained.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [clang, gcc]
    name: build-and-test (${{ matrix.compiler }})
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang

      - name: Configure
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then CC=clang; CXX=clang++; else CC=gcc; CXX=g++; fi
          cmake -G Ninja -B build -S . -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="$CC" -DCMAKE_CXX_COMPILER="$CXX"

      - name: Build
        run: cmake --build build --target hrx-xclbinutil --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-and-test-windows:
    runs-on: windows-latest
    name: build-and-test (windows, clang-cl)
    steps:
      - uses: actions/checkout@v4

      # clang-cl, not cl: the vendored aie-pdi-transform sources use GNU extensions
      # (__attribute__((aligned)), void* arithmetic) that MSVC's cl rejects and clang
      # accepts.
      - name: Configure (clang-cl)
        run: cmake -B build -S . -A x64 -T ClangCL

      - name: Build
        run: cmake --build build --config Release --target hrx-xclbinutil --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

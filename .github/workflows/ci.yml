# SPDX-License-Identifier: Apache-2.0
#
# Builds hrx-xclbinutil on public GitHub runners (Linux, clang + gcc) and runs the
# functional smoke test. No NPU, no XRT, no Boost — the tool is self-contained.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [clang, gcc]
    name: build-and-test (${{ matrix.compiler }})
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang

      - name: Configure
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then CC=clang; CXX=clang++; else CC=gcc; CXX=g++; fi
          cmake -G Ninja -B build -S . -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="$CC" -DCMAKE_CXX_COMPILER="$CXX"

      - name: Build
        run: cmake --build build --target hrx-xclbinutil --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
